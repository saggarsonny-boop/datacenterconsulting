<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DCC electric logo">
  <defs>
    <linearGradient id="gb" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#2FC8FF"/>
    </linearGradient>
    <linearGradient id="bl" x1="32" y1="10" x2="32" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="45%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="bg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark plate -->
  <rect width="64" height="64" rx="14" fill="#020F18"/>

  <!-- Teal gradient border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="url(#gb)" stroke-width="2"/>

  <!-- Circuit-corner brackets -->
  <path d="M7 17 L7 7 L17 7" fill="none" stroke="#00E5CF" stroke-width="1.5" stroke-linecap="square" opacity="0.7"/>
  <path d="M47 7 L57 7 L57 17" fill="none" stroke="#00E5CF" stroke-width="1.5" stroke-linecap="square" opacity="0.7"/>
  <path d="M7 47 L7 57 L17 57" fill="none" stroke="#00E5CF" stroke-width="1.5" stroke-linecap="square" opacity="0.7"/>
  <path d="M57 47 L57 57 L47 57" fill="none" stroke="#00E5CF" stroke-width="1.5" stroke-linecap="square" opacity="0.7"/>

  <!-- Corner node dots -->
  <circle cx="7" cy="7" r="2" fill="#00E5CF" opacity="0.55"/>
  <circle cx="57" cy="7" r="2" fill="#00E5CF" opacity="0.55"/>
  <circle cx="7" cy="57" r="2" fill="#00E5CF" opacity="0.55"/>
  <circle cx="57" cy="57" r="2" fill="#00E5CF" opacity="0.55"/>

  <!-- Horizontal power/transmission lines -->
  <line x1="5" y1="32" x2="22" y2="32" stroke="#00E5CF" stroke-width="1" opacity="0.28"/>
  <line x1="42" y1="32" x2="59" y2="32" stroke="#00E5CF" stroke-width="1" opacity="0.28"/>
  <!-- Cross-brace verticals (tower struts) -->
  <line x1="11" y1="27" x2="11" y2="37" stroke="#00E5CF" stroke-width="0.8" opacity="0.2"/>
  <line x1="17" y1="29" x2="17" y2="35" stroke="#00E5CF" stroke-width="0.8" opacity="0.2"/>
  <line x1="47" y1="27" x2="47" y2="37" stroke="#00E5CF" stroke-width="0.8" opacity="0.2"/>
  <line x1="53" y1="29" x2="53" y2="35" stroke="#00E5CF" stroke-width="0.8" opacity="0.2"/>

  <!-- Central lightning bolt -->
  <path d="M36 10 L24 34 L32 34 L26 54 L40 30 L32 30 Z" fill="url(#bl)" filter="url(#bg)"/>
</svg>
