<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DCC power mark">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="32" y1="6" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="40%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background plate -->
  <rect width="64" height="64" rx="13" fill="#020C12"/>

  <!-- Teal gradient border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="11.5" fill="none" stroke="url(#border)" stroke-width="2.5"/>

  <!-- Subtle horizontal power lines left/right of bolt -->
  <line x1="4" y1="32" x2="18" y2="32" stroke="#00E5CF" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="60" y2="32" stroke="#00E5CF" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <circle cx="18" cy="32" r="2" fill="none" stroke="#00E5CF" stroke-width="1" opacity="0.5"/>
  <circle cx="46" cy="32" r="2" fill="none" stroke="#00E5CF" stroke-width="1" opacity="0.5"/>

  <!-- Bold centred lightning bolt -->
  <path d="M37 6 L21 34 L31 34 L25 58 L45 30 L34 30 Z"
        fill="url(#bolt)" filter="url(#glow)"/>
</svg>
